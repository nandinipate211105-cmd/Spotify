<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Your favourite music is here</title>
    <link rel="stylesheet" href="Spotify.css">
</head>
    
<body>
    <nav>
        <ul>
            <li class="brand">
                <img src="logo.png" alt="Spotify">Spotify</li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>
    <div class="container">
        <div class="songlist">
            <h1>Today's biggest hits...!!</h1>
            <div class="songItemContainer">
                <div class="songItem">
                    <img src="covers/10.jpg" alt="Let me Love You">
                    <span class="songName">Let me Love You</span>
                    <span class="timestamp"><span>04:27</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="0"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/9.jpg" alt="CLAY">
                    <span class="songName">CLAY</span>
                    <span class="timestamp"><span>03:28</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="1"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/8.jpg" alt="Taylor Swift">
                    <span class="songName">Taylor Swift</span>
                    <span class="timestamp"><span>03:50</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="2"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/7.jpg" alt="Back It Up">
                    <span class="songName">Back It Up</span>
                    <span class="timestamp"><span>04:33</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="3"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/6.jpg" alt="The Safety Dance">
                    <span class="songName">The Safety Dance</span>
                    <span class="timestamp"><span>03:28</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="4"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/5.jpg" alt="Artist Item">
                    <span class="songName">Artist Item</span>
                    <span class="timestamp"><span>03:28</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="5"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/4.jpg" alt="Rich The Kid">
                    <span class="songName">Rich The Kid</span>
                    <span class="timestamp"><span>04:27</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="6"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/3.jpg" alt="They Mad-Lowkey Peschy">
                    <span class="songName">They Mad-Lowkey Peschy</span>
                    <span class="timestamp"><span>04:33</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="7"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/2.jpg" alt="Trap">
                    <span class="songName">Trap</span>
                    <span class="timestamp"><span>02:33</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="8"></i>
                </span>
                </div>
                <div class="songItem">
                    <img src="covers/1.jpg" alt="Legion">
                    <span class="songName">Legion</span>
                    <span class="timestamp"><span>03:50</span><i class="fas fa-play-circle songItemPlay" role="button" aria-label="Play song: Legion" id="9"></i>
                </span>
                </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">
        <div class="icons">
            <!-- fontawesome icons  -->
        <i class="fas fa-3x fa-backward" id="previous"></i>
        <i class="fas fa-3x fa-play-circle" id="masterPlay"></i>
        <i class="fas fa-3x fa-forward" id="next"></i>
        </div>
        <div class="songInfo">
            <img src="playing.gif" width="42px" alt="Playing animation" id="gif">
            <span id="masterSongName">Warriyo - Mortals [NCS Release]</span>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/ab4be2c4b5.js" crossorigin="anonymous"></script>  
    <script src="Spotify.js"></script>
</body>
</html>
